# nginx site config for the production SPA image.
#
# - Serves the built React bundle from /usr/share/nginx/html.
# - Falls back to index.html so client-side routes (deep links like
#   /s/{slug}/admin) resolve instead of 404ing.
# - Long-caches fingerprinted assets; never caches index.html so new deploys
#   are picked up immediately.
# - Proxies /api to the backend so the SPA stays same-origin (matches the dev
#   Vite proxy). Set BACKEND_UPSTREAM at deploy time (default: backend:8000).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Container healthcheck endpoint.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Same-origin API proxy to the backend.
    location /api/ {
        # CSV imports can be up to 10 MB (see StoreCsvImportController::MAX_UPLOAD_BYTES).
        # Allow a little headroom so oversized uploads hit the app's clear 422
        # ("CSV exceeds the maximum allowed size") instead of nginx's opaque 413.
        # nginx's default is only 1 MB, which silently rejects any large import.
        client_max_body_size 12m;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # Fingerprinted build assets: immutable, cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entry: never cache index.html; fall back to it for client routes.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
