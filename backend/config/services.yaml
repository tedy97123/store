# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Return HTTP 429 for login-throttling failures; delegate all other auth
    # failures to Lexik's JWT handler (see App\Security\AuthenticationFailureHandler).
    App\Security\AuthenticationFailureHandler:
        arguments:
            $decorated: '@lexik_jwt_authentication.handler.authentication_failure'

    # Shared Scryfall throttle: the lock file lives in var/ (app-owned, shared
    # by web + messenger processes on the host) rather than the system temp
    # dir, where PrivateTmp systemd units would silently give each service its
    # own file — reverting the "one global budget" guarantee — and where a
    # predictable world-writable path invites tampering.
    App\Service\Scryfall\ScryfallRateLimiter:
        arguments:
            $lockFilePath: '%kernel.project_dir%/var/scryfall_rate.lock'

    # Per-import run logs live under the logs dir (var/log/imports/*.log).
    App\Service\Import\ImportLogger:
        arguments:
            $importLogDir: '%kernel.logs_dir%/imports'

when@test:
    services:
        # Replace the real Scryfall client with a network-free fake so the test
        # suite is deterministic and never reaches the live API.
        App\Tests\Support\FakeScryfallClient:
            autowire: true
            public: true
        App\Service\Scryfall\ScryfallClient:
            alias: App\Tests\Support\FakeScryfallClient
            public: true
