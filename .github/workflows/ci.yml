name: CI

on:
  push:
    branches: [master, 'claude/**']
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: store
          POSTGRES_PASSWORD: store
          POSTGRES_DB: store
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job starts.
        options: >-
          --health-cmd "pg_isready -U store"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The test env appends a "_test" suffix (see config/packages/doctrine.yaml),
      # so this base URL resolves to the store_test database at runtime.
      DATABASE_URL: "postgresql://store:store@127.0.0.1:5432/store?serverVersion=16&charset=utf8"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, sodium, intl, mbstring, ctype, iconv
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists
        env:
          APP_ENV: test

      - name: Create test database
        run: PGPASSWORD=store psql -h 127.0.0.1 -U store -d store -c 'CREATE DATABASE store_test OWNER store;'

      - name: Run migrations (test)
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          APP_ENV: test

      - name: Lint DI container
        run: php bin/console lint:container
        env:
          APP_ENV: test

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          APP_ENV: test

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
